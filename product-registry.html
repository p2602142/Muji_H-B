<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SCAN — Product Registry</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #fafaf8;
  --white: #ffffff;
  --ink: #111111;
  --mid: #555555;
  --light: #aaaaaa;
  --line: #e8e8e4;
  --line2: #f2f2ee;
  --hb-bg: #fff7ed; --hb-fg: #c2500a;
  --bs-bg: #eff6ff; --bs-fg: #1d59c4;
  --stock-bg: #f0fdf4; --stock-fg: #166534;
  --span-bg: #faf5ff; --span-fg: #6b21a8;
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}

body {
  background: var(--bg);
  font-family: var(--sans);
  color: var(--ink);
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
}

/* TOP BAR */
.topbar {
  position: sticky; top: 0; z-index: 50;
  background: var(--bg);
  border-bottom: 1px solid var(--line);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.app-name { font-family: var(--mono); font-size: 13px; font-weight: 500; letter-spacing: 0.1em; }
.count-badge { font-family: var(--mono); font-size: 11px; color: var(--light); }

/* TABS */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--line);
  background: var(--bg);
  position: sticky; top: 49px; z-index: 40;
}
.tab {
  flex: 1; padding: 12px;
  font-size: 12px; font-weight: 500;
  color: var(--light); text-align: center; cursor: pointer;
  border-bottom: 2px solid transparent;
  border-top: none; border-left: none; border-right: none;
  background: none; font-family: var(--sans);
  transition: all 0.15s; letter-spacing: 0.02em;
}
.tab.active { color: var(--ink); border-bottom-color: var(--ink); }

/* VIEWS */
.view { display: none; }
.view.active { display: block; }

/* FORM */
.form-wrap { padding: 4px 20px 0; display: flex; flex-direction: column; }
.field { padding: 14px 0; border-bottom: 1px solid var(--line2); }
.field:last-child { border-bottom: none; }
.field-label {
  font-size: 10px; font-weight: 500;
  letter-spacing: 0.12em; color: var(--light);
  text-transform: uppercase; margin-bottom: 6px;
  font-family: var(--mono);
}
.field-input {
  font-family: var(--mono); font-size: 14px;
  color: var(--ink); background: none;
  border: none; outline: none; width: 100%; padding: 0; line-height: 1.5;
}
.field-input::placeholder { color: var(--line); }
textarea.field-input { resize: none; min-height: 52px; font-size: 13px; }

.toggle-row { display: flex; gap: 8px; margin-top: 2px; }
.tog {
  flex: 1; padding: 9px 0;
  font-size: 12px; font-weight: 500;
  border-radius: 6px; border: 1.5px solid var(--line);
  background: none; color: var(--mid); cursor: pointer;
  transition: all 0.15s; font-family: var(--sans); letter-spacing: 0.02em;
}
.tog.sel-hb   { background: var(--hb-bg);    border-color: var(--hb-fg);    color: var(--hb-fg); }
.tog.sel-bs   { background: var(--bs-bg);    border-color: var(--bs-fg);    color: var(--bs-fg); }
.tog.sel-stock { background: var(--stock-bg); border-color: var(--stock-fg); color: var(--stock-fg); }
.tog.sel-span  { background: var(--span-bg);  border-color: var(--span-fg);  color: var(--span-fg); }

.btn-submit {
  margin: 20px 20px 32px;
  width: calc(100% - 40px);
  padding: 15px; background: var(--ink); color: white;
  font-family: var(--sans); font-size: 14px; font-weight: 500;
  border: none; border-radius: 8px; cursor: pointer;
  letter-spacing: 0.02em; transition: opacity 0.15s;
}
.btn-submit:active { opacity: 0.7; }

/* LIST */
.toolbar { padding: 12px 16px; display: flex; gap: 8px; align-items: center; }
.search-wrap { flex: 1; position: relative; }
.search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--light); font-size: 14px; pointer-events: none;
}
.search-input {
  width: 100%; padding: 9px 10px 9px 30px;
  font-family: var(--mono); font-size: 12px;
  background: var(--white); border: 1px solid var(--line);
  border-radius: 6px; outline: none; color: var(--ink);
}
.search-input:focus { border-color: var(--ink); }

.chips {
  padding: 0 16px 10px;
  display: flex; gap: 6px;
  overflow-x: auto; scrollbar-width: none;
}
.chips::-webkit-scrollbar { display: none; }
.chip {
  padding: 5px 12px; font-size: 11px; font-weight: 500;
  border-radius: 20px; border: 1px solid var(--line);
  background: none; color: var(--mid); cursor: pointer;
  white-space: nowrap; font-family: var(--sans); transition: all 0.12s;
}
.chip.active { background: var(--ink); border-color: var(--ink); color: white; }

.entry-list { padding: 0 16px 80px; display: flex; flex-direction: column; gap: 8px; }

.entry-card {
  background: var(--white); border: 1px solid var(--line);
  border-radius: 8px; padding: 14px 16px; cursor: pointer;
  transition: border-color 0.15s;
  animation: slideIn 0.18s ease;
}
@keyframes slideIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
.entry-card:active { border-color: #999; }

.entry-top {
  display: flex; align-items: flex-start;
  justify-content: space-between; gap: 8px; margin-bottom: 5px;
}
.entry-name { font-size: 13px; font-weight: 500; line-height: 1.4; }
.entry-upc { font-family: var(--mono); font-size: 10px; color: var(--light); margin-top: 2px; }
.entry-tags { display: flex; gap: 5px; flex-shrink: 0; margin-top: 1px; }
.tag {
  font-size: 9px; font-weight: 600; letter-spacing: 0.05em;
  padding: 3px 7px; border-radius: 4px; font-family: var(--mono);
}
.tag-hb    { background: var(--hb-bg);    color: var(--hb-fg); }
.tag-bs    { background: var(--bs-bg);    color: var(--bs-fg); }
.tag-stock { background: var(--stock-bg); color: var(--stock-fg); }
.tag-span  { background: var(--span-bg);  color: var(--span-fg); }

.entry-detail { font-size: 11px; color: var(--mid); line-height: 1.5; margin-top: 4px; }
.entry-remarks { font-size: 10px; color: var(--light); font-family: var(--mono); margin-top: 4px; }
.entry-time { font-family: var(--mono); font-size: 9px; color: var(--light); margin-top: 8px; }

.empty { text-align: center; padding: 64px 20px; color: var(--light); }
.empty-icon { font-size: 28px; margin-bottom: 12px; }
.empty-text { font-size: 13px; }

/* SHEET */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.35);
  z-index: 200; display: none; align-items: flex-end;
}
.overlay.open { display: flex; }
.sheet {
  background: var(--white); border-radius: 16px 16px 0 0;
  padding: 0 0 32px; width: 100%;
  max-height: 85vh; overflow-y: auto;
  animation: sheetUp 0.22s cubic-bezier(0.32,0.72,0,1);
}
@keyframes sheetUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
.sheet-handle { width: 36px; height: 4px; background: var(--line); border-radius: 2px; margin: 12px auto 16px; }
.sheet-head {
  padding: 0 20px 16px; border-bottom: 1px solid var(--line2);
  display: flex; align-items: center; justify-content: space-between;
}
.sheet-title { font-size: 15px; font-weight: 600; }
.sheet-close {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--line2); border: none; cursor: pointer;
  font-size: 12px; display: flex; align-items: center; justify-content: center; color: var(--mid);
}
.sheet-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; }
.detail-row { display: flex; flex-direction: column; gap: 3px; }
.detail-lbl { font-size: 9px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--light); font-family: var(--mono); }
.detail-val { font-size: 13px; color: var(--ink); line-height: 1.5; }
.detail-val.mono { font-family: var(--mono); }
.sheet-actions { padding: 4px 20px 0; display: flex; gap: 8px; }
.btn-delete {
  flex: 1; padding: 13px; border: 1.5px solid #fca5a5;
  background: #fff5f5; color: #dc2626;
  font-family: var(--sans); font-size: 13px; font-weight: 500; border-radius: 8px; cursor: pointer;
}
.btn-close2 {
  flex: 1; padding: 13px; border: 1.5px solid var(--line);
  background: none; color: var(--mid);
  font-family: var(--sans); font-size: 13px; font-weight: 500; border-radius: 8px; cursor: pointer;
}

/* IO */
.io-wrap { padding: 20px; display: flex; flex-direction: column; gap: 10px; }
.btn-io {
  width: 100%; padding: 14px;
  font-family: var(--sans); font-size: 13px; font-weight: 500;
  border-radius: 8px; cursor: pointer; transition: opacity 0.12s; letter-spacing: 0.01em;
}
.btn-io:active { opacity: 0.7; }
.btn-io.primary { background: var(--ink); color: white; border: none; }
.btn-io.outline { background: none; color: var(--mid); border: 1.5px solid var(--line); }
.btn-io.danger-o { background: none; color: #dc2626; border: 1.5px solid #fca5a5; }

.drop-zone {
  border: 1.5px dashed var(--line); border-radius: 10px;
  padding: 36px 20px; text-align: center; cursor: pointer;
  transition: all 0.15s; margin-top: 6px;
}
.drop-zone.dragover { border-color: var(--ink); background: var(--line2); }
.drop-icon { font-size: 24px; margin-bottom: 8px; }
.drop-text { font-size: 13px; color: var(--mid); }
.drop-hint { font-size: 10px; color: var(--light); margin-top: 4px; font-family: var(--mono); }
#file-input { display: none; }

.io-note { font-size: 10px; color: var(--light); line-height: 1.8; font-family: var(--mono); padding-top: 4px; }

/* DIVIDER */
.divider { height: 1px; background: var(--line2); margin: 4px 0; }

/* UPC ROW */
.upc-row { display: flex; align-items: center; gap: 8px; }
.upc-row .field-input { flex: 1; }
.btn-scan {
  flex-shrink: 0;
  width: 36px; height: 36px;
  background: var(--ink); color: white;
  border: none; border-radius: 7px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: opacity 0.15s;
}
.btn-scan:active { opacity: 0.6; }

/* SCANNER OVERLAY */
.scan-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: #000;
  display: none; flex-direction: column;
}
.scan-overlay.open { display: flex; }

.scan-topbar {
  padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
  position: absolute; top: 0; left: 0; right: 0; z-index: 10;
}
.scan-label { font-family: var(--mono); font-size: 12px; color: rgba(255,255,255,0.7); letter-spacing: 0.1em; }
.btn-scan-close {
  background: rgba(255,255,255,0.12); border: none;
  color: white; font-size: 13px; padding: 7px 14px;
  border-radius: 20px; cursor: pointer; font-family: var(--sans);
}

#scanner-video {
  width: 100%; height: 100%;
  object-fit: cover;
}

.scan-frame {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
.scan-box {
  width: 260px; height: 120px;
  border: 2px solid rgba(255,255,255,0.9);
  border-radius: 10px;
  box-shadow: 0 0 0 2000px rgba(0,0,0,0.45);
  position: relative;
}
.scan-line {
  position: absolute; left: 10px; right: 10px; top: 50%;
  height: 2px; background: #c8ff00;
  box-shadow: 0 0 8px #c8ff00;
  animation: scanPulse 1.6s ease-in-out infinite;
}
@keyframes scanPulse {
  0%,100% { opacity: 0.3; }
  50%      { opacity: 1; }
}
.scan-hint {
  position: absolute; bottom: -32px; left: 50%; transform: translateX(-50%);
  font-size: 11px; color: rgba(255,255,255,0.55);
  font-family: var(--mono); white-space: nowrap; letter-spacing: 0.06em;
}

/* TOAST */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(70px);
  background: var(--ink); color: white;
  padding: 10px 20px; border-radius: 20px;
  font-size: 12px; font-weight: 500; z-index: 999;
  transition: transform 0.22s cubic-bezier(0.32,0.72,0,1);
  white-space: nowrap; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="topbar">
  <div class="app-name">SCAN</div>
  <div class="count-badge" id="count-badge">0 items</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('add')">Add</button>
  <button class="tab" onclick="switchTab('list')">List</button>
  <button class="tab" onclick="switchTab('io')">Export / Import</button>
</div>

<!-- ADD -->
<div class="view active" id="view-add">
  <div class="form-wrap">
    <div class="field">
      <div class="field-label">UPC</div>
      <div class="upc-row">
        <input class="field-input" id="f-upc" type="text" placeholder="000000000000" inputmode="numeric" maxlength="14">
        <button class="btn-scan" onclick="openScanner()" title="Scan barcode">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/>
            <path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
            <line x1="7" y1="8" x2="7" y2="16"/><line x1="10" y1="8" x2="10" y2="16"/>
            <line x1="13" y1="8" x2="13" y2="16"/><line x1="16" y1="8" x2="16" y2="16"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="field">
      <div class="field-label">Product Name</div>
      <input class="field-input" id="f-name" type="text" placeholder="Name">
    </div>
    <div class="field">
      <div class="field-label">Detail</div>
      <textarea class="field-input" id="f-detail" placeholder="Description, size, variant…"></textarea>
    </div>
    <div class="field">
      <div class="field-label">Remarks</div>
      <input class="field-input" id="f-remarks" type="text" placeholder="Optional note">
    </div>
    <div class="field">
      <div class="field-label">Category</div>
      <div class="toggle-row" id="cat-group">
        <button class="tog" data-val="H&B" onclick="pickCat(this)">H&amp;B</button>
        <button class="tog" data-val="B&S" onclick="pickCat(this)">B&amp;S</button>
      </div>
    </div>
    <div class="field">
      <div class="field-label">Location</div>
      <div class="toggle-row" id="loc-group">
        <button class="tog" data-val="stock" onclick="pickLoc(this)">Stock</button>
        <button class="tog" data-val="span" onclick="pickLoc(this)">Span</button>
      </div>
    </div>
  </div>
  <button class="btn-submit" onclick="addEntry()">Save Entry</button>
</div>

<!-- LIST -->
<div class="view" id="view-list">
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input class="search-input" id="search-input" placeholder="Search UPC or name…" oninput="renderList()">
    </div>
  </div>
  <div class="chips" id="filter-chips">
    <button class="chip active" onclick="setFilter('all',this)">All</button>
    <button class="chip" onclick="setFilter('H&B',this)">H&amp;B</button>
    <button class="chip" onclick="setFilter('B&S',this)">B&amp;S</button>
    <button class="chip" onclick="setFilter('stock',this)">Stock</button>
    <button class="chip" onclick="setFilter('span',this)">Span</button>
  </div>
  <div class="entry-list" id="entry-list"></div>
</div>

<!-- EXPORT / IMPORT -->
<div class="view" id="view-io">
  <div class="io-wrap">
    <button class="btn-io primary" onclick="downloadJSON()">↓ &nbsp;Download JSON</button>
    <div class="divider"></div>
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <div class="drop-icon">↑</div>
      <div class="drop-text">Import JSON</div>
      <div class="drop-hint">tap to browse · or drag & drop</div>
    </div>
    <input type="file" id="file-input" accept=".json" onchange="handleFileImport(event)">
    <p class="io-note">Import merges with existing data.<br>Duplicate IDs are skipped.</p>
    <div class="divider"></div>
    <button class="btn-io danger-o" onclick="clearAll()">Clear All Entries</button>
  </div>
</div>

<!-- DETAIL SHEET -->
<div class="overlay" id="overlay" onclick="closeSheet(event)">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <div class="sheet-title" id="sheet-title"></div>
      <button class="sheet-close" onclick="closeSheetForce()">✕</button>
    </div>
    <div class="sheet-body" id="sheet-body"></div>
    <div class="sheet-actions">
      <button class="btn-delete" id="btn-delete">Delete</button>
      <button class="btn-close2" onclick="closeSheetForce()">Close</button>
    </div>
  </div>
</div>

<!-- SCANNER OVERLAY -->
<div class="scan-overlay" id="scan-overlay">
  <div class="scan-topbar">
    <div class="scan-label">SCAN BARCODE</div>
    <button class="btn-scan-close" onclick="closeScanner()">Cancel</button>
  </div>
  <video id="scanner-video" autoplay playsinline muted></video>
  <div class="scan-frame">
    <div class="scan-box">
      <div class="scan-line"></div>
      <div class="scan-hint">Align barcode within frame</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let db = JSON.parse(localStorage.getItem('scan_db') || '[]');
let filterActive = 'all';
let selCat = null, selLoc = null;

function save() {
  localStorage.setItem('scan_db', JSON.stringify(db));
  document.getElementById('count-badge').textContent = db.length + ' item' + (db.length !== 1 ? 's' : '');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2200);
}

function switchTab(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  const idx = ['add','list','io'].indexOf(name);
  document.querySelectorAll('.tab')[idx].classList.add('active');
  if (name === 'list') renderList();
}

function pickCat(btn) {
  selCat = btn.dataset.val;
  document.querySelectorAll('#cat-group .tog').forEach(b => b.classList.remove('sel-hb','sel-bs'));
  btn.classList.add(selCat === 'H&B' ? 'sel-hb' : 'sel-bs');
}

function pickLoc(btn) {
  selLoc = btn.dataset.val;
  document.querySelectorAll('#loc-group .tog').forEach(b => b.classList.remove('sel-stock','sel-span'));
  btn.classList.add(selLoc === 'stock' ? 'sel-stock' : 'sel-span');
}

function addEntry() {
  const upc  = document.getElementById('f-upc').value.trim();
  const name = document.getElementById('f-name').value.trim();
  if (!upc)  { toast('UPC is required'); return; }
  if (!name) { toast('Product name is required'); return; }

  db.unshift({
    id: Date.now().toString(),
    upc, name,
    detail:   document.getElementById('f-detail').value.trim(),
    remarks:  document.getElementById('f-remarks').value.trim(),
    category: selCat || '—',
    location: selLoc || '—',
    ts: new Date().toISOString()
  });

  save();
  ['f-upc','f-name','f-detail','f-remarks'].forEach(id => document.getElementById(id).value = '');
  document.querySelectorAll('.tog').forEach(b => b.classList.remove('sel-hb','sel-bs','sel-stock','sel-span'));
  selCat = null; selLoc = null;
  toast('Saved ✓');
}

function setFilter(f, btn) {
  filterActive = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})
    + '  ' + d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}

function tagCls(cat, loc) {
  let tags = '';
  if (cat && cat !== '—') {
    const cls = cat === 'H&B' ? 'tag-hb' : 'tag-bs';
    tags += `<span class="tag ${cls}">${esc(cat)}</span>`;
  }
  if (loc && loc !== '—') {
    const cls = loc === 'stock' ? 'tag-stock' : 'tag-span';
    tags += `<span class="tag ${cls}">${esc(loc)}</span>`;
  }
  return tags;
}

function renderList() {
  const q = (document.getElementById('search-input').value || '').toLowerCase();
  const list = document.getElementById('entry-list');
  const items = db.filter(e => {
    const mf = filterActive === 'all' || e.category === filterActive || e.location === filterActive;
    const ms = !q || e.upc.includes(q) || e.name.toLowerCase().includes(q) || (e.detail||'').toLowerCase().includes(q);
    return mf && ms;
  });

  if (!items.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">◎</div><div class="empty-text">No entries</div></div>`;
    return;
  }

  list.innerHTML = items.map(e => `
    <div class="entry-card" onclick="openSheet('${e.id}')">
      <div class="entry-top">
        <div>
          <div class="entry-name">${esc(e.name)}</div>
          <div class="entry-upc">${esc(e.upc)}</div>
        </div>
        <div class="entry-tags">${tagCls(e.category, e.location)}</div>
      </div>
      ${e.detail   ? `<div class="entry-detail">${esc(e.detail)}</div>` : ''}
      ${e.remarks  ? `<div class="entry-remarks">↳ ${esc(e.remarks)}</div>` : ''}
      <div class="entry-time">${fmtDate(e.ts)}</div>
    </div>
  `).join('');
}

function openSheet(id) {
  const e = db.find(x => x.id === id);
  if (!e) return;
  document.getElementById('sheet-title').textContent = e.name;
  document.getElementById('sheet-body').innerHTML = `
    <div class="detail-row"><div class="detail-lbl">UPC</div><div class="detail-val mono">${esc(e.upc)}</div></div>
    <div class="detail-row"><div class="detail-lbl">Category</div><div class="detail-val">${esc(e.category)}</div></div>
    <div class="detail-row"><div class="detail-lbl">Location</div><div class="detail-val">${esc(e.location)}</div></div>
    ${e.detail   ? `<div class="detail-row"><div class="detail-lbl">Detail</div><div class="detail-val">${esc(e.detail)}</div></div>` : ''}
    ${e.remarks  ? `<div class="detail-row"><div class="detail-lbl">Remarks</div><div class="detail-val mono">${esc(e.remarks)}</div></div>` : ''}
    <div class="detail-row"><div class="detail-lbl">Timestamp</div><div class="detail-val mono">${fmtDate(e.ts)}</div></div>
  `;
  document.getElementById('btn-delete').onclick = () => { deleteEntry(id); };
  document.getElementById('overlay').classList.add('open');
}

function deleteEntry(id) {
  db = db.filter(x => x.id !== id);
  save(); closeSheetForce(); renderList(); toast('Deleted');
}

function closeSheet(e) { if (e.target === document.getElementById('overlay')) closeSheetForce(); }
function closeSheetForce() { document.getElementById('overlay').classList.remove('open'); }

function downloadJSON() {
  if (!db.length) { toast('Nothing to export'); return; }
  const blob = new Blob([JSON.stringify(db, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'scan_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  toast('Downloaded ✓');
}

function handleFileImport(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!Array.isArray(imported)) throw 0;
      const ids = new Set(db.map(x => x.id));
      let added = 0;
      imported.forEach(item => { if (!ids.has(item.id)) { db.push(item); added++; } });
      save(); toast(`Imported ${added} entries`);
    } catch { toast('Invalid JSON'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const imp = JSON.parse(ev.target.result);
      if (!Array.isArray(imp)) throw 0;
      const ids = new Set(db.map(x => x.id));
      let added = 0;
      imp.forEach(item => { if (!ids.has(item.id)) { db.push(item); added++; } });
      save(); toast(`Imported ${added} entries`);
    } catch { toast('Invalid JSON'); }
  };
  reader.readAsText(file);
});

function clearAll() {
  if (!db.length) { toast('Already empty'); return; }
  if (confirm('Clear all ' + db.length + ' entries?')) {
    db = []; save(); renderList(); toast('Cleared');
  }
}

save(); // init badge
</script>
<!-- ZXing barcode scanner -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/zxing-js/0.20.0/zxing.min.js"></script>
<script>
// ── SCANNER ──
let scanReader = null;
let scanStream = null;

async function openScanner() {
  const overlay = document.getElementById('scan-overlay');
  overlay.classList.add('open');

  try {
    const hints = new Map();
    const formats = [
      ZXing.BarcodeFormat.EAN_13,
      ZXing.BarcodeFormat.EAN_8,
      ZXing.BarcodeFormat.UPC_A,
      ZXing.BarcodeFormat.UPC_E,
      ZXing.BarcodeFormat.CODE_128,
      ZXing.BarcodeFormat.CODE_39,
    ];
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, formats);

    scanReader = new ZXing.BrowserMultiFormatReader(hints);

    const video = document.getElementById('scanner-video');
    const constraints = { video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } };
    scanStream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = scanStream;

    scanReader.decodeFromStream(scanStream, video, (result, err) => {
      if (result) {
        const code = result.getText();
        document.getElementById('f-upc').value = code;
        closeScanner();
        toast('Scanned: ' + code);
        // focus next field
        setTimeout(() => document.getElementById('f-name').focus(), 300);
      }
    });
  } catch (err) {
    closeScanner();
    if (err.name === 'NotAllowedError') {
      toast('Camera permission denied');
    } else {
      toast('Camera unavailable');
    }
  }
}

function closeScanner() {
  document.getElementById('scan-overlay').classList.remove('open');
  if (scanReader) { try { scanReader.reset(); } catch(e){} scanReader = null; }
  if (scanStream) { scanStream.getTracks().forEach(t => t.stop()); scanStream = null; }
}
</script>
